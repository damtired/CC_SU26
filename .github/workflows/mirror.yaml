name: 'Mirror'

on:
  workflow_dispatch:
  push:
    branches: ['**']
    tags: ['**']

jobs:
  mirror:
    name: 'Mirror'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 'Mirror to Codeberg'
        uses: cssnr/mirror-repository-action@v1
        with:
          url: https://github.com/codecollectiveKHM/CC_SU26
          host: https://codeberg.org
          # owner: codecollectiveKHM
          # repo: CC_SU26
          create: true
          username: codecollective
          password: ${{ secrets.CODEBERG_TOKEN }}